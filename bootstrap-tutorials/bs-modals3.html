<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <button class="btn btn-success" id="themebutton">
        <i class="bi bi-moon-stars-fill"></i>
    </button>
    <div class="container">
        <div class="row my-3">
            <div class="col-4 card card-body">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target='#mymodal'>Launch Modal</button>
                <div class="modal fade" id="mymodal">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5>First Modal</h5>
                                <button class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                This is my first modal. Click on the button to open the second modal on the screen.
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-info" data-bs-toggle="modal" data-bs-target="#secondmodal">Open Second Modal</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal fade" id="secondmodal">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5>Second Modal</h5>
                            </div>
                            <div class="modal-body">
                                This is my Second modal. Click on the button to return back the first modal on the screen.
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-info" data-bs-toggle="modal" data-bs-target="#mymodal">Previous Modal</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="js/bootstrap.min.js"></script>
<script>
    let themebutton = document.querySelector('#themebutton')

    themebutton.addEventListener('click', (e) => {
        let themeElement = document.querySelector('html')
        let theme = themeElement.getAttribute('data-bs-theme')
        theme = (theme == 'dark' ? "light" : "dark")
        console.log(theme)
        themeElement.setAttribute('data-bs-theme', theme)
        let icon = (theme == 'dark' ? '<i class="bi bi-moon-stars-fill"></i>' : '<i class="bi bi-brightness-high-fill"></i>')
        themebutton.innerHTML = icon
    })
</script>

</html>
