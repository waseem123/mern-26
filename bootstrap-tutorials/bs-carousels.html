<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <div class="row my-4">
            <div class="col-12">
                <div class="carousel slide" id="mycarousel" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active" data-bs-interval="2000">
                            <img class="img-fluid imgstyling" src="img/berries.jpg" alt="">
                        </div>
                        <div class="carousel-item" data-bs-interval="2000">
                            <img class="img-fluid imgstyling" src="img/flight.jpg" alt="">
                        </div>
                        <div class="carousel-item"data-bs-interval="2000">
                            <img class="img-fluid imgstyling" src="img/catering.jpg" alt="">
                        </div>
                    </div>
                    <button data-bs-target="#mycarousel" class="carousel-control-prev" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>

                    <button data-bs-target="#mycarousel" class="carousel-control-next" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="js/bootstrap.min.js"></script>

</html>
