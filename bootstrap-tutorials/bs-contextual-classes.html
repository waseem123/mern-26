<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1>Contextual Classes</h1>
            </div>
            <button class="col-3 btn btn-primary">Primary Button</button>
            <button class="col-3 btn btn-secondary">Secondary Button</button>
            <button class="col-3 btn btn-light">Light Button</button>
            <button class="col-3 btn btn-dark">Dark Button</button>
            <br>
            <button class="col-3 btn btn-success">Success Button</button>
            <button class="col-3 btn btn-warning">Warning Button</button>
            <button class="col-3 btn btn-danger">Danger Button</button>
            <button class="col-3 btn btn-info">Info Button</button>
            <hr>

            <h2 class="text-primary">Primary Text</h2>
            <h2 class="text-secondary">Secondary Text</h2>
            <h2 class="text-success">Success Text</h2>
            <h2 class="text-danger">Danger Text</h2>
            <h2 class="text-warning">Warning Text</h2>
            <h2 class="text-info">Info Text</h2>
            <h2 class="text-light">Light Text</h2>
            <h2 class="text-dark">Dark Text</h2>

            <hr>
            <h2 class="text-bg-primary">Light Text</h2>
            <h2 class="text-bg-secondary">Light Text</h2>


        </div>
        <button class="btn btn-primary btn-sm">Small Button</button>
        <button class="btn btn-primary">Medium Button</button>
        <button class="btn btn-primary btn-lg">Large Button</button>
        <hr>
    </div>
</body>
<script src="js/bootstrap.min.js"></script>

</html>
