<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
    <button data-bs-toggle="modal" data-bs-target="#mymodal">Launch Modal</button>
    <div class="modal fade" id="mymodal">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>FULL SCREEN MODAL</h2>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h1>Modal Body</h1>
                    <p>
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ipsam vero provident, deserunt eveniet
                        quasi voluptates quae recusandae cum reiciendis illo, cupiditate amet officia odit quam nihil
                        voluptatibus debitis neque quia.
                    </p>
                </div>
                <div class="modal-footer">
                    <button data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="js/bootstrap.min.js"></script>

</html>
